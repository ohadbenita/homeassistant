---
alexa_notification:
  description: "Send Alexa notification and restore volume"
  mode: queued
  max: 10
  fields:
    alexa_device:
      description: "Alexa device (media_player.*)"
      example: "media_player.study_room"
      required: true
    message:
      description: "Message to send"
      example: "The garage door has been open for 10 minutes."
      required: true
    volume:
      description: "Temporary volume (0-1)"
      example: 0.25
      default: 0.25

  sequence:
    - variables:
        mp: "{{ alexa_device }}"
        original_volume: "{{ state_attr(mp, 'volume_level') | float(0.25) }}"
        temp_volume: "{{ volume | float(0.25) }}"

    - action: media_player.volume_set
      continue_on_error: true
      target:
        entity_id: "{{ mp }}"
      data:
        volume_level: "{{ temp_volume }}"

    - action: notify.alexa_media
      continue_on_error: true
      data:
        message: "{{ message }}"
        title: "{{ message }}"
        target: "{{ mp }}"

    - delay:
        seconds: 1

    - action: media_player.volume_set
      continue_on_error: true
      target:
        entity_id: "{{ mp }}"
      data:
        volume_level: "{{ original_volume }}"


activate_alexa_actionable_notification:
  description: 'Activates an actionable notification on a specific echo device'
  fields:
    text:
      description: 'The text you would like alexa to speak.'
      example: 'What would you like the thermostat set to?'
    event_id:
      description: 'Correlation ID for event responses'
      example: 'ask_for_temperature'
    alexa_device:
      description: 'Alexa device you want to trigger'
      example: 'media_player.bedroom_echo'
  sequence:
    - action: media_player.volume_set
      data:
        volume_level: 0.3
        entity_id: "{{ alexa_device }}"

    - action: input_text.set_value
      data:
        entity_id: input_text.alexa_actionable_notification
        value: '{"text": "{{ text }}", "event": "{{ event_id }}"}'

    - action: media_player.play_media
      data:
        entity_id: "{{ alexa_device }}"
        media_content_type: skill
        media_content_id: !secret alexa_actionable_actions_skill_id

    - action: script.turn_on
      entity_id: script.alexa_notification
