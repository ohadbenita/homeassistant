---

template:
  - sensor:
      - name: "Study room cover position"
        unique_id: study_room_cover_position
        unit_of_measurement: "%"
        state: >
          {{ state_attr('cover.study_room', 'current_position') }}
        availability: >
          {{ state_attr('cover.study_room','current_position') is number
             or states('cover.study_room') in ['open','closed'] }}

  - binary_sensor:
      - name: "Study room cover moving"
        unique_id: study_room_cover_moving
        state: >
          {% set change = states('sensor.study_room_cover_position_stats') %}
          {{ change | int(0) != 0 }}

sensor:
  - platform: statistics
    name: study_room_cover_position_stats
    entity_id: sensor.study_room_cover_position
    state_characteristic: change
    max_age:
      seconds: 3
    sampling_size: 5
    precision: 0


automation:
  - alias: "Study Room - Turn lights off when no one is in the room"
    id: study_room_turn_ac_and_lights_off
    initial_state: true
    trigger:
      - platform: state
        entity_id: binary_sensor.apollo_msr_1_ce7700_radar_target
        to: 'off'
        for:
          minutes: 2

      - platform: homeassistant
        event: start

    condition:
      - condition: state
        entity_id: switch.shellyplus1pm_e465b8f12024_switch_0
        state: 'on'
      - condition: state
        entity_id: binary_sensor.apollo_msr_1_ce7700_radar_target
        state: 'off'

    action:
      - action: homeassistant.turn_off
        entity_id: switch.shellyplus1pm_e465b8f12024_switch_0


  - alias: "Study Room - Turn on the lights when motion is detected"
    id: study_room_turn_lights_on_motion_detected
    trigger:
      - platform: state
        entity_id: binary_sensor.apollo_msr_1_ce7700_radar_target
        to: 'on'
      - platform: numeric_state
        entity_id: sensor.apollo_msr_1_ce7700_radar_still_distance
        below: 370

    condition:
      - condition: numeric_state
        entity_id: sensor.apollo_msr_1_ce7700_radar_still_distance
        below: 370
      - condition: state
        entity_id: switch.shellyplus1pm_e465b8f12024_switch_0
        state: 'off'
      - condition: state
        entity_id: binary_sensor.apollo_msr_1_ce7700_radar_target
        state: 'on'
      - not:
          - condition: state
            entity_id: sensor.creality_ender_v3_ke_current_print_state
            state: 'printing'
    action:
      - action: homeassistant.turn_on
        entity_id: switch.shellyplus1pm_e465b8f12024_switch_0


  - alias: "Study Room - Turn AC off when no one is in the room"
    id: study_room_turn_ac_off_when_no_motion_is_detected
    initial_state: true
    trigger:
      - platform: state
        entity_id: binary_sensor.apollo_msr_1_ce7700_radar_target
        to: 'off'
        for:
          minutes: 10

      - platform: homeassistant
        event: start

    condition:
      - condition: template
        value_template: >-
          {{ not is_state('climate.study_room_ac', 'off') }}
      - condition: state
        entity_id: binary_sensor.apollo_msr_1_ce7700_radar_target
        state: 'off'

    action:
      - action: homeassistant.turn_off
        entity_id: climate.study_room_ac


  - alias: Study Skadis light - follow occupancy
    description: Turn the study Skadis light on/off based on occupancy sensor.
    mode: single

    trigger:
      - platform: state
        entity_id: binary_sensor.occupancy_sensor_b978_occupancy
        to:
          - "on"
          - "off"

    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: binary_sensor.occupancy_sensor_b978_occupancy
                state: "on"
            sequence:
              - action: light.turn_on
                entity_id: light.study_skadis_led_driver
          - conditions:
              - condition: state
                entity_id: binary_sensor.occupancy_sensor_b978_occupancy
                state: "off"
            sequence:
              - action: light.turn_off
                entity_id: light.study_skadis_led_driver

