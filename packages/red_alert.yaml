---
automation:
  - alias: Lehavim red alert turn ac and lights
    id: red_alert_lehavim_turn_off_appliances
    initial_state: true
    mode: restart

    trigger:
      - platform: state
        entity_id: sensor.oref_alert_lehavim
        to: "alert"
        id: alert

      - platform: state
        entity_id: sensor.oref_alert_lehavim
        to: "ok"
        id: ok

    action:
      - choose:
          - conditions:
              - condition: trigger
                id: alert
            sequence:
              - action: scene.create
                data:
                  scene_id: red_alert_lehavim_before_alert
                  snapshot_entities:
                    - switch.shelly1pmminig3_34b7da8f8b78_switch_0  # Main hallway
                    - switch.shelly1pmminig3_34b7da8b78c4_switch_0  # Shelter entrance
                    - switch.shellyplus2pm_a0a3b3682b10_switch_0    # Basement main
                    - switch.shellyplus2pm_a0a3b3682b10_switch_1    # Piano light
                    - switch.shelly1pmminig3_34b7da92245c_switch_0
                    - switch.living_room_couch_light
                    - switch.shellyplus2pm_fcb4670e68e8_switch_0
                    - switch.shellyplus2pm_fcb4670e68e8_switch_1
                    - switch.shelly1pmminig3_34b7da9342c4_switch_0
                    - group.all_ac

              - action: switch.turn_on
                target:
                  entity_id:
                    - switch.shelly1pmminig3_34b7da8f8b78_switch_0  # Main hallway
                    - switch.shelly1pmminig3_34b7da8b78c4_switch_0  # Shelter entrance
                    - switch.shellyplus2pm_a0a3b3682b10_switch_0    # Basement main
                    - switch.shellyplus2pm_a0a3b3682b10_switch_1    # Piano light

              - delay: "00:00:45"

              - action: homeassistant.turn_off
                target:
                  entity_id: group.all_ac

              - action: switch.turn_off
                target:
                  entity_id:
                    - switch.shelly1pmminig3_34b7da92245c_switch_0
                    - switch.living_room_couch_light
                    - switch.shellyplus2pm_fcb4670e68e8_switch_0
                    - switch.shellyplus2pm_fcb4670e68e8_switch_1
                    - switch.shelly1pmminig3_34b7da9342c4_switch_0

          - conditions:
              - condition: trigger
                id: ok
            sequence:
              - action: scene.turn_on
                target:
                  entity_id: scene.red_alert_lehavim_before_alert

  - alias: Lehavim red alert
    id: red_alert_lehavim
    initial_state: false
    trigger:
      - platform: state
        entity_id: sensor.oref_alert_lehavim
        to: 'alert'

    condition:
      - condition: time
        weekday:
          - sun
          - mon
          - tue
          - wed
          - thu
        after: '08:00:00'
        before: '21:00:00'
      - condition: state
        entity_id: binary_sensor.jewish_calendar_issur_melacha_in_effect
        state: 'off'

    action:
      - action: notify.send_message
        target:
          entity_id: notify.telegram_bot_659000495_155103022
        data_template:
          message: >-
            Red alert in Lehavim, you got 45 seconds to get to a shelter

      - action: lock.unlock
        entity_id: lock.kitchen_door

      - action: switch.turn_on
        entity_id:
          - switch.shellyplus2pm_d48afc581860_switch_1  # Pantry
          - switch.shellyplus2pm_d48afc581860_switch_1  # Kitchen path flood light
          - switch.shellyplus2pm_fcb467a557a0_switch_0  # Bathroom door
          - switch.clinic_door_flood_light  # Clinic door
          - switch.shelly1pmminig3_34b7da8f8b78_switch_0  # Main hallway
          - switch.shelly1pmminig3_34b7da8b78c4_switch_0  # Shelter entrance
          - switch.shelly1pmminig3_34b7da8a0338_switch_0  # Shelter main
          - switch.shellyplus2pm_a0a3b3682b10_switch_0  # Basement main
          - switch.shellyplus2pm_a0a3b3682b10_switch_1  # Piano light

      - action: script.alexa_notification
        data:
          alexa_device: media_player.everywhere
          volume: 0.7
          message: >-
            Red alert, please head to the nearest shelter now.
            Red alert, please head to the nearest shelter now.
            Red alert, please head to the nearest shelter now!

      - delay: '00:10:00'

      - action: lock.lock
        entity_id: lock.kitchen_door


  - alias: Ella IASA red alert
    id: red_alert_ella_iasa
    initial_state: true
    trigger:
      - platform: state
        entity_id: sensor.oref_alert_jeruslaem_west
        to: 'alert'

    condition:
      - condition: numeric_state
        entity_id: sensor.ella_to_iasa_ella_benita_distance
        below: 5000

    action:
      - action: notify.send_message
        target:
          entity_id: notify.telegram_bot_659000495_155103022
        data_template:
          message: >-
            Red alert in Jerusalem, check on Ella
