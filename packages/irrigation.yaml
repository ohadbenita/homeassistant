---
############################
#  6 - שנאי                #
#  2 - מסטר ארון השקייה    #
############################
#  3 - עשבי תיבול          #
#  4 - עצים צד דרום, מערב  #
#  5 - גדר חיה (צד מזרח)   #
############################
sensor:
  - platform: history_stats
    name: Irrigation L3 On Time Last Week
    entity_id: switch.irrigation_l3
    state: "on"
    type: time
    start: "{{ now().replace(hour=0, minute=0, second=0) - timedelta(days=7) }}"
    end: "{{ now() }}"

  - platform: history_stats
    name: Irrigation L3 On Time Last Month
    entity_id: switch.irrigation_l3
    state: "on"
    type: time
    start: "{{ now().replace(day=1, hour=0, minute=0, second=0) - timedelta(days=30) }}"
    end: "{{ now() }}"

  - platform: history_stats
    name: Irrigation L4 On Time Last Week
    entity_id: switch.irrigation_l4
    state: "on"
    type: time
    start: "{{ now().replace(hour=0, minute=0, second=0) - timedelta(days=7) }}"
    end: "{{ now() }}"

  - platform: history_stats
    name: Irrigation L4 On Time Last Month
    entity_id: switch.irrigation_l4
    state: "on"
    type: time
    start: "{{ now().replace(day=1, hour=0, minute=0, second=0) - timedelta(days=30) }}"
    end: "{{ now() }}"

  - platform: history_stats
    name: Irrigation L5 On Time Last Week
    entity_id: switch.irrigation_l5
    state: "on"
    type: time
    start: "{{ now().replace(hour=0, minute=0, second=0) - timedelta(days=7) }}"
    end: "{{ now() }}"

  - platform: history_stats
    name: Irrigation L5 On Time Last Month
    entity_id: switch.irrigation_l5
    state: "on"
    type: time
    start: "{{ now().replace(day=1, hour=0, minute=0, second=0) - timedelta(days=30) }}"
    end: "{{ now() }}"

input_datetime:
  irrigation_disabled_until:
    name: Irrigation disabled until
    has_date: true
    has_time: true


script:
  irrigation_cycle:
    alias: "Irrigation cycle"
    mode: parallel
    fields:
      additional_switches:
        description: "List of additional switches to control (YAML list format)"
        example: |
          - switch.irrigation_l5
          - switch.irrigation_l4
        required: true
        selector:
          object:
      irrigation_duration_minutes:
        description: "Time in minutes to wait between turning on the switches"
        example: 10  # 10 minutes
        required: true
        selector:
          number:
            min: 1
            max: 60
            unit_of_measurement: minutes
            step: 1
    sequence:
      # Turn on switch.irrigation_l6 (main AC adapter)
      - action: switch.turn_on
        target:
          entity_id: switch.irrigation_l6

      # Wait 5 seconds before proceeding
      - delay: "00:00:05"

      # Turn on switch.irrigation_l2 (master in the watering cabinet)
      - action: switch.turn_on
        target:
          entity_id: switch.irrigation_l2

      # Wait 5 seconds before proceeding
      - delay: "00:00:02"

      # Turn on each of the additional switches provided as a YAML list
      - action: switch.turn_on
        target:
          entity_id: "{{ additional_switches }}"

      # Wait for the irrigation duration (converted to minutes)
      - delay:
          minutes: "{{ irrigation_duration_minutes }}"

      # Reverse the process: Turn off additional switches first
      - action: switch.turn_off
        target:
          entity_id: "{{ additional_switches }}"

      # Turn off switch.irrigation_l2 (master in the watering cabinet)
      - action: switch.turn_off
        target:
          entity_id: switch.irrigation_l2

      # Wait 5 seconds before proceeding
      - delay: "00:00:05"

      # Turn off switch.irrigation_l6 (main AC adapter)
      - action: switch.turn_off
        target:
          entity_id: switch.irrigation_l6

  irrigation_disable_add_48h:
    alias: Irrigation disable - add 48h
    mode: single
    sequence:
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.irrigation_disabled_until
        data:
          datetime: >-
            {% set s = states('input_datetime.irrigation_disabled_until') %}
            {% set now_ts = as_timestamp(now()) | float(0) %}
            {% set s_ts = (as_timestamp(s) if s not in ['unknown','unavailable',''] else 0) | float(0) %}
            {% set base = (s_ts if s_ts > now_ts else now_ts) | float(0) %}
            {{ (base + (48*60*60)) | int | timestamp_custom('%Y-%m-%d %H:%M:%S') }}

  irrigation_disable_set_3h:
    alias: Irrigation disable - set 3h
    mode: single
    sequence:
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.irrigation_disabled_until
        data:
          datetime: >-
            {{ ((as_timestamp(now()) | float(0)) + (3*60*60)) | int | timestamp_custom('%Y-%m-%d %H:%M:%S') }}

  irrigation_disable_enable_now:
    alias: Irrigation disable - enable now
    mode: single
    sequence:
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.irrigation_disabled_until
        data:
          datetime: >-
            {{ (as_timestamp(now()) | float(0)) | int | timestamp_custom('%Y-%m-%d %H:%M:%S') }}


automation:
  - alias: Weekly Irrigation Cycle - trees and bushes
    id: irrigation_simple_weekly_schedule_trees_bushes
    initial_state: true
    trigger:
      - platform: sun
        event: sunrise
        offset: "-1:00:00"

    condition:
      - condition: time
        weekday:
          - mon
          - wed
          - fri
      - condition: template
        value_template: >-
          {% set s = states('input_datetime.irrigation_disabled_until') %}
          {% if s in ['unknown','unavailable',''] %}
            true
          {% else %}
            {{ (as_timestamp(now()) | float(0)) >= (as_timestamp(s) | float(0)) }}
          {% endif %}

    action:
      - if:
        - condition: state  # yamllint disable-line rule:indentation
          entity_id: input_boolean.rain_expected_next_12_hours
          state: 'off'
        then:
          - action: script.irrigation_cycle
            data:
              additional_switches:
                - switch.irrigation_l4
                - switch.irrigation_l5
              irrigation_duration_minutes: 45
        else:
          - action: notify.send_message
            target:
              entity_id: notify.telegram_bot_659000495_155103022
            data:
              title: "Irrigation"
              message: "[Trees] Irrigation cycle skipped as it's probably going to rain soon"


  - alias: Weekly Irrigation Cycle - flowers and herbs
    id: irrigation_simple_weekly_schedule_flowers_herbs
    initial_state: true
    trigger:
      - platform: sun
        event: sunrise
        offset: "00:00:00"

    condition:
      - condition: template
        value_template: >-
          {% set s = states('input_datetime.irrigation_disabled_until') %}
          {% if s in ['unknown','unavailable',''] %}
            true
          {% else %}
            {{ (as_timestamp(now()) | float(0)) >= (as_timestamp(s) | float(0)) }}
          {% endif %}

    action:
      - if:
        - condition: state  # yamllint disable-line rule:indentation
          entity_id: input_boolean.rain_expected_next_12_hours
          state: 'off'
        then:
          - action: script.irrigation_cycle
            data:
              additional_switches:
                - switch.irrigation_l3
              irrigation_duration_minutes: 7
        else:
          - action: notify.send_message
            target:
              entity_id: notify.telegram_bot_659000495_155103022
            data:
              title: "Irrigation"
              message: "[Flowers & herbs] Irrigation cycle skipped as it's probably going to rain soon"


  - alias: Irrigation Watchdog
    id: irrigation_watchdog_shutdown
    initial_state: true
    trigger:
      - platform: time_pattern
        minutes: "/30"
        seconds: "*"

    condition:
      condition: and
      conditions:
        - condition: state
          entity_id: switch.irrigation_l6
          state: 'on'
          for:
            minutes: 70

    action:
      - action: switch.turn_off
        entity_id: switch.irrigation_l6
      - action: switch.turn_off
        entity_id: group.irrigation_switches
      - action: switch.turn_off
        entity_id: switch.irrigation_l2

      - wait_for_trigger:
          - platform: state
            entity_id: switch.irrigation_l6
            to: 'off'
        timeout:
          minutes: 2
        continue_on_timeout: false

      - action: notify.send_message
        target:
          entity_id: notify.telegram_bot_659000495_155103022
        data:
          message: 'Irrigation Watchdog had to stop the irrigation, please check the issue with the automations'


  - alias: "Update Daily Max Temperature"
    id: weather_update_daily_max_temperature
    trigger:
      - platform: time
        at: "01:00:00"
    action:
      - action: weather.get_forecasts
        data:
          type: daily
        target:
          entity_id: weather.openweathermap
        response_variable: daily_forecasts

      - action: input_number.set_value
        data:
          entity_id: input_number.daily_expected_max_temperature
          value: >
            {{ daily_forecasts['weather.openweathermap']['forecast'][0].temperature }}


  - alias: Alert on low garden fertilizer level
    id: garden_fertilizer_low_level_alert
    initial_state: true
    trigger:
      - platform: state
        entity_id: binary_sensor.watering_nutrient_water_level_moisture
        to: 'off'
        for:
          hours: 1
    action:
      - action: notify.mobile_app_ohadbenita
        data:
          title: "Fertilizer Refill Needed"
          message: "The garden fertilizer tank is empty and needs refilling."
